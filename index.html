<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz Chapitre 6 – Immunité & Excrétion</title>
<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #0b1e33, #123c5d);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    #quiz-container {
        background: rgba(255,255,255,0.08);
        padding: 30px;
        border-radius: 20px;
        width: 90%;
        max-width: 700px;
        box-shadow: 0 0 25px rgba(0,0,0,0.4);
        backdrop-filter: blur(10px);
        animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    h1 {
        text-align: center;
        margin-bottom: 10px;
        font-size: 2rem;
    }

    #progress {
        height: 10px;
        background: rgba(255,255,255,0.2);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 20px;
    }

    #progress-bar {
        height: 100%;
        width: 0%;
        background: #00eaff;
        transition: 0.4s;
    }

    .question-img {
        width: 100%;
        border-radius: 10px;
        margin-bottom: 15px;
    }

    .choice {
        background: rgba(255,255,255,0.15);
        padding: 12px;
        margin: 10px 0;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    .choice:hover {
        background: rgba(255,255,255,0.25);
    }

    .correct { background: #2ecc71 !important; }
    .wrong { background: #e74c3c !important; }

    #result {
        text-align: center;
        font-size: 1.4rem;
        margin-top: 20px;
    }

    button {
        margin-top: 20px;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        background: #00eaff;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #00bcd4;
    }
</style>
</head>
<body>

<div id="quiz-container">
    <h1>Quiz – Chapitre 6</h1>
    <div id="progress"><div id="progress-bar"></div></div>

    <img id="q-img" class="question-img" src="" style="display:none">

    <h2 id="question"></h2>
    <div id="choices"></div>
    <div id="result"></div>
    <button id="next-btn" style="display:none">Question suivante</button>
</div>

<script>
const questions = [
    {
        img: "https://i.imgur.com/8pQKp1U.png",
        q: "Quel est le rôle principal des ganglions lymphatiques ?",
        choices: ["Produire l'urine", "Filtrer la lymphe et détecter les agents pathogènes", "Produire le glucose"],
        answer: 1
    },
    {
        img: "https://i.imgur.com/6z4u2yU.png",
        q: "Comment appelle-t-on le liquide interstitiel lorsqu'il circule dans les vaisseaux lymphatiques ?",
        choices: ["Plasma", "Lymphe", "Urée"],
        answer: 1
    },
    {
        img: "https://i.imgur.com/1zYx1mM.png",
        q: "Quel organe filtre le sang pour produire l'urine ?",
        choices: ["Le foie", "Le rein", "La rate"],
        answer: 1
    },
    {
        img: "",
        q: "Quel processus permet à un lymphocyte d’englober et digérer un agent pathogène ?",
        choices: ["Phagocytose", "Osmose", "Diffusion"],
        answer: 0
    },
    {
        img: "",
        q: "La sueur est composée à environ…",
        choices: ["99 % d’eau", "50 % d’eau", "10 % d’eau"],
        answer: 0
    },
    {
        img: "",
        q: "Quel est le rôle principal d’un anticorps ?",
        choices: ["Transporter l’oxygène", "Neutraliser un agent pathogène spécifique", "Produire du glucose"],
        answer: 1
    }
];

let index = 0;
let score = 0;

function loadQuestion() {
    const q = questions[index];
    document.getElementById("question").textContent = q.q;

    const img = document.getElementById("q-img");
    if (q.img) {
        img.src = q.img;
        img.style.display = "block";
    } else {
        img.style.display = "none";
    }

    const choicesDiv = document.getElementById("choices");
    choicesDiv.innerHTML = "";

    q.choices.forEach((choice, i) => {
        const div = document.createElement("div");
        div.className = "choice";
        div.textContent = choice;
        div.onclick = () => selectAnswer(i);
        choicesDiv.appendChild(div);
    });

    document.getElementById("progress-bar").style.width = ((index) / questions.length) * 100 + "%";
}

function selectAnswer(i) {
    const q = questions[index];
    const choices = document.querySelectorAll(".choice");

    choices.forEach(c => c.onclick = null);

    if (i === q.answer) {
        choices[i].classList.add("correct");
        score++;
    } else {
        choices[i].classList.add("wrong");
        choices[q.answer].classList.add("correct");
    }

    document.getElementById("next-btn").style.display = "block";
}

document.getElementById("next-btn").onclick = () => {
    index++;
    if (index < questions.length) {
        loadQuestion();
        document.getElementById("next-btn").style.display = "none";
    } else {
        showResult();
    }
};

function showResult() {
    document.getElementById("quiz-container").innerHTML = `
        <h1>Résultat final</h1>
        <p style="font-size:1.8rem; text-align:center;">Score : ${score} / ${questions.length}</p>
        <button onclick="location.reload()">Rejouer</button>
    `;
}

loadQuestion();
</script>

</body>
</html>
