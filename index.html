<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Quiz – Immunité et Excrétion</title>
  <style>
    :root {
      --primary: #1b8bbf;
      --primary-dark: #156488;
      --accent: #2ecc71;
      --danger: #e74c3c;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #222;
      --muted: #777;
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #e0f4ff 0, #f5f7fb 40%, #eef1f7 100%);
      color: var(--text);
    }

    .app {
      max-width: 960px;
      margin: 30px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: var(--primary-dark);
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 25px;
      font-size: 0.95rem;
    }

    .quiz-container {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .progress-wrapper {
      flex: 1;
      min-width: 200px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e3e7f0;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), #4fd1c5);
      transition: width 0.3s ease;
    }

    .pill {
      padding: 6px 12px;
      border-radius: 999px;
      background: #e8f6ff;
      color: var(--primary-dark);
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .pill span {
      font-weight: 600;
    }

    .question-card {
      margin-top: 10px;
    }

    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .question-index {
      font-weight: 600;
      color: var(--primary-dark);
    }

    .question-type {
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: #f0f4ff;
      color: var(--muted);
    }

    .question-text {
      font-size: 1rem;
      margin-bottom: 12px;
    }

    .question-extra {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    .option {
      border-radius: 8px;
      border: 1px solid #dde3f0;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      background: #f9fbff;
      transition: all 0.2s ease;
      font-size: 0.95rem;
    }

    .option input {
      accent-color: var(--primary);
    }

    .option:hover {
      border-color: var(--primary);
      background: #f1f7ff;
    }

    .option.correct {
      border-color: var(--accent);
      background: #e9fbf3;
    }

    .option.incorrect {
      border-color: var(--danger);
      background: #ffecec;
    }

    .short-answer {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #dde3f0;
      font-size: 0.95rem;
      outline: none;
      background: #f9fbff;
    }

    .short-answer:focus {
      border-color: var(--primary);
      background: #f1f7ff;
    }

    .feedback {
      min-height: 20px;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .feedback.correct {
      color: var(--accent);
    }

    .feedback.incorrect {
      color: var(--danger);
    }

    .explanation {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .btn-secondary {
      background: #eef2fb;
      color: var(--primary-dark);
    }

    .btn-secondary:hover {
      background: #e0e6fa;
    }

    .score-pill {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .score-pill span {
      font-weight: 600;
      color: var(--primary-dark);
    }

    .results-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .results-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px 22px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    .results-title {
      font-size: 1.2rem;
      margin-bottom: 6px;
      color: var(--primary-dark);
    }

    .results-score {
      font-size: 2rem;
      font-weight: 700;
      margin: 8px 0;
    }

    .results-detail {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .results-badges {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      background: #f0f4ff;
      color: var(--primary-dark);
    }

    .badge.good {
      background: #e9fbf3;
      color: #1e8a4a;
    }

    .badge.warn {
      background: #fff4e5;
      color: #c56a1a;
    }

    @media (max-width: 600px) {
      .quiz-container {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Quiz – Immunité et Excrétion</h1>
    <p class="subtitle">
      Questions inspirées du chapitre : système lymphatique, immunité, homéostasie, solubilité, dilution, système urinaire…
    </p>

    <div class="quiz-container">
      <div class="top-bar">
        <div class="progress-wrapper">
          <div class="progress-label">
            <span id="question-counter">Question 1 / 10</span>
            <span id="progress-percent">0 %</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>
        <div class="pill">
          🔬 <span>Chapitre 6</span> · Immunité & Excrétion
        </div>
      </div>

      <div class="question-card">
        <div class="question-header">
          <div class="question-index" id="question-index-label">Question 1</div>
          <div class="question-type" id="question-type-label">Choix multiple</div>
        </div>
        <div class="question-text" id="question-text"></div>
        <div class="question-extra" id="question-extra"></div>

        <div id="options-container"></div>

        <div class="feedback" id="feedback"></div>
        <div class="explanation" id="explanation"></div>

        <div class="controls">
          <button class="btn-secondary" id="btn-prev">⬅ Précédent</button>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <div class="score-pill">
              Score actuel : <span id="score-display">0 / 0</span>
            </div>
            <button class="btn-secondary" id="btn-check">Vérifier</button>
            <button class="btn-primary" id="btn-next">Suivant ➜</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Résultats -->
  <div class="results-modal" id="results-modal">
    <div class="results-card">
      <div class="results-title">Résultats du quiz</div>
      <div class="results-score" id="results-score"></div>
      <div class="results-detail" id="results-detail"></div>
      <div class="results-badges" id="results-badges"></div>
      <button class="btn-primary" id="btn-restart">Recommencer le quiz</button>
    </div>
  </div>

  <script>
    // --- BANQUE DE QUESTIONS ---
    // type: "mcq" (choix multiple), "truefalse", "short"
    const questions = [
      {
        id: 1,
        type: "mcq",
        theme: "Lymphatique",
        text: "Quel liquide comble l’espace entre les cellules et provient de la filtration du plasma ?",
        extra: "",
        options: [
          "Le plasma sanguin",
          "Le liquide interstitiel",
          "La lymphe",
          "L’urine"
        ],
        correctIndex: 1,
        explanation:
          "Le liquide interstitiel provient du plasma filtré par les capillaires sanguins et baigne toutes les cellules."
      },
      {
        id: 2,
        type: "mcq",
        theme: "Immunité innée",
        text: "Quel énoncé décrit le mieux l’immunité innée ?",
        extra: "",
        options: [
          "Une immunité spécifique à un seul virus",
          "Une immunité acquise après vaccination",
          "Une immunité présente dès la naissance, non spécifique",
          "Une immunité transmise uniquement par le lait maternel"
        ],
        correctIndex: 2,
        explanation:
          "L’immunité innée est présente dès la naissance et est généralement non spécifique (peau, muqueuses, inflammation…)."
      },
      {
        id: 3,
        type: "truefalse",
        theme: "Immunité active",
        text: "Les anticorps produits lors d’une immunité active sont spécifiques à un agent pathogène précis.",
        extra: "",
        correctBool: true,
        explanation:
          "L’immunité active est spécifique : chaque anticorps est adapté à un agent pathogène particulier."
      },
      {
        id: 4,
        type: "mcq",
        theme: "Vaccination",
        text: "Quel énoncé décrit le mieux la vaccination ?",
        extra: "",
        options: [
          "Introduire un microbe pour provoquer volontairement la maladie",
          "Introduire une substance qui stimule le système immunitaire sans causer la maladie",
          "Introduire des antibiotiques pour tuer les bactéries",
          "Introduire uniquement des vitamines pour renforcer le système immunitaire"
        ],
        correctIndex: 1,
        explanation:
          "La vaccination consiste à introduire une substance qui stimule la production d’anticorps spécifiques sans provoquer la maladie."
      },
      {
        id: 5,
        type: "mcq",
        theme: "Homéostasie",
        text: "Quel énoncé décrit le mieux l’homéostasie ?",
        extra: "",
        options: [
          "La stabilité du rythme cardiaque",
          "La stabilité des conditions physiques et chimiques du milieu intérieur",
          "La stabilité de la température extérieure",
          "La stabilité de l’alimentation"
        ],
        correctIndex: 1,
        explanation:
          "L’homéostasie est la stabilité des paramètres physiques et chimiques du milieu intérieur, particulièrement du sang."
      },
      {
        id: 6,
        type: "mcq",
        theme: "Système urinaire",
        text: "Quel organe filtre le sang et produit l’urine ?",
        extra: "",
        options: [
          "La vessie",
          "Le rein",
          "L’uretère",
          "Les glandes sudoripares"
        ],
        correctIndex: 1,
        explanation:
          "Les reins filtrent le sang, retirent les déchets et produisent l’urine."
      },
      {
        id: 7,
        type: "truefalse",
        theme: "Solubilité",
        text: "La solubilité d’un soluté est la quantité maximale de soluté qu’on peut dissoudre dans un volume donné de solvant à une température donnée.",
        extra: "",
        correctBool: true,
        explanation:
          "C’est exactement la définition de la solubilité : quantité maximale de soluté dissous dans un solvant à une température donnée."
      },
      {
        id: 8,
        type: "mcq",
        theme: "Dilution",
        text: "Lors d’une dilution, on…",
        extra: "",
        options: [
          "ajoute du soluté pour augmenter la concentration",
          "ajoute du solvant pour diminuer la concentration",
          "retire du solvant pour augmenter la concentration",
          "ajoute du soluté et du solvant en même temps"
        ],
        correctIndex: 1,
        explanation:
          "Une dilution consiste à ajouter du solvant à une solution initiale pour obtenir une solution finale de concentration plus faible."
      },
      {
        id: 9,
        type: "short",
        theme: "Glandes sudoripares",
        text: "Nomme un rôle important de la sueur en lien avec l’homéostasie.",
        extra: "(Réponds en quelques mots, par ex. « refroidir le corps ».)",
        keywords: ["température", "refroidir", "refroidissement", "régulation", "thermorégulation"],
        explanation:
          "La sueur permet notamment de réguler la température corporelle : en s’évaporant, elle refroidit le corps."
      },
      {
        id: 10,
        type: "short",
        theme: "Immunité",
        text: "Comment appelle-t-on les molécules produites par les lymphocytes B qui neutralisent les agents pathogènes ?",
        extra: "",
        keywords: ["anticorps", "antibody", "antibodies"],
        explanation:
          "Les lymphocytes B produisent des anticorps, qui se fixent aux agents pathogènes et les neutralisent."
      }
    ];

    // --- ÉTAT DU QUIZ ---
    let currentIndex = 0;
    let userAnswers = {}; // id -> {value, isCorrect}
    let score = 0;

    const questionTextEl = document.getElementById("question-text");
    const questionExtraEl = document.getElementById("question-extra");
    const optionsContainer = document.getElementById("options-container");
    const feedbackEl = document.getElementById("feedback");
    const explanationEl = document.getElementById("explanation");
    const questionCounterEl = document.getElementById("question-counter");
    const progressFillEl = document.getElementById("progress-fill");
    const progressPercentEl = document.getElementById("progress-percent");
    const questionIndexLabelEl = document.getElementById("question-index-label");
    const questionTypeLabelEl = document.getElementById("question-type-label");
    const scoreDisplayEl = document.getElementById("score-display");

    const btnPrev = document.getElementById("btn-prev");
    const btnNext = document.getElementById("btn-next");
    const btnCheck = document.getElementById("btn-check");

    const resultsModal = document.getElementById("results-modal");
    const resultsScoreEl = document.getElementById("results-score");
    const resultsDetailEl = document.getElementById("results-detail");
    const resultsBadgesEl = document.getElementById("results-badges");
    const btnRestart = document.getElementById("btn-restart");

    function updateProgress() {
      const total = questions.length;
      const current = currentIndex + 1;
      questionCounterEl.textContent = `Question ${current} / ${total}`;
      questionIndexLabelEl.textContent = `Question ${current}`;
      const percent = Math.round((current / total) * 100);
      progressFillEl.style.width = percent + "%";
      progressPercentEl.textContent = percent + " %";

      const answeredCount = Object.values(userAnswers).filter(a => a.isCorrect !== undefined).length;
      scoreDisplayEl.textContent = `${score} / ${answeredCount}`;
    }

    function renderQuestion() {
      const q = questions[currentIndex];
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
      explanationEl.textContent = "";

      questionTextEl.textContent = q.text;
      questionExtraEl.textContent = q.extra || "";

      // Type label
      if (q.type === "mcq") {
        questionTypeLabelEl.textContent = "Choix multiple";
      } else if (q.type === "truefalse") {
        questionTypeLabelEl.textContent = "Vrai / Faux";
      } else {
        questionTypeLabelEl.textContent = "Réponse courte";
      }

      optionsContainer.innerHTML = "";

      if (q.type === "mcq") {
        const wrapper = document.createElement("div");
        wrapper.className = "options";
        q.options.forEach((opt, idx) => {
          const label = document.createElement("label");
          label.className = "option";

          const input = document.createElement("input");
          input.type = "radio";
          input.name = "q" + q.id;
          input.value = idx;

          label.appendChild(input);
          label.appendChild(document.createTextNode(opt));
          wrapper.appendChild(label);
        });
        optionsContainer.appendChild(wrapper);
      } else if (q.type === "truefalse") {
        const wrapper = document.createElement("div");
        wrapper.className = "options";

        ["Vrai", "Faux"].forEach((txt, idx) => {
          const label = document.createElement("label");
          label.className = "option";

          const input = document.createElement("input");
          input.type = "radio";
          input.name = "q" + q.id;
          input.value = idx === 0 ? "true" : "false";

          label.appendChild(input);
          label.appendChild(document.createTextNode(txt));
          wrapper.appendChild(label);
        });
        optionsContainer.appendChild(wrapper);
      } else if (q.type === "short") {
        const input = document.createElement("input");
        input.type = "text";
        input.className = "short-answer";
        input.placeholder = "Écris ta réponse ici…";
        optionsContainer.appendChild(input);
      }

      // Si déjà répondu, pré-remplir
      const saved = userAnswers[q.id];
      if (saved) {
        if (q.type === "mcq" || q.type === "truefalse") {
          const inputs = optionsContainer.querySelectorAll("input");
          inputs.forEach((inp) => {
            if (String(inp.value) === String(saved.value)) {
              inp.checked = true;
            }
          });
        } else if (q.type === "short") {
          const input = optionsContainer.querySelector("input");
          input.value = saved.value || "";
        }
        if (saved.isCorrect !== undefined) {
          showCorrection(q, saved);
        }
      }

      updateProgress();
      btnPrev.disabled = currentIndex === 0;
      btnNext.textContent = currentIndex === questions.length - 1 ? "Terminer ➜" : "Suivant ➜";
    }

    function getCurrentAnswer() {
      const q = questions[currentIndex];
      if (q.type === "mcq" || q.type === "truefalse") {
        const checked = optionsContainer.querySelector("input:checked");
        if (!checked) return null;
        return checked.value;
      } else {
        const input = optionsContainer.querySelector("input");
        if (!input) return null;
        return input.value.trim();
      }
    }

    function checkAnswer() {
      const q = questions[currentIndex];
      const raw = getCurrentAnswer();
      if (raw === null || raw === "") {
        feedbackEl.textContent = "Choisis ou écris une réponse avant de vérifier.";
        feedbackEl.className = "feedback incorrect";
        return;
      }

      let isCorrect = false;

      if (q.type === "mcq") {
        isCorrect = Number(raw) === q.correctIndex;
      } else if (q.type === "truefalse") {
        const boolVal = raw === "true";
        isCorrect = boolVal === q.correctBool;
      } else if (q.type === "short") {
        const answerLower = raw.toLowerCase();
        isCorrect = q.keywords.some((kw) => answerLower.includes(kw.toLowerCase()));
      }

      const prev = userAnswers[q.id];
      if (!prev || prev.isCorrect === undefined) {
        if (isCorrect) score++;
      } else {
        // si on change une mauvaise réponse en bonne
        if (!prev.isCorrect && isCorrect) score++;
        // si on change une bonne en mauvaise (rare), on pourrait décrémenter
        if (prev.isCorrect && !isCorrect) score = Math.max(0, score - 1);
      }

      userAnswers[q.id] = { value: raw, isCorrect };
      showCorrection(q, userAnswers[q.id]);
      updateProgress();

      // Si dernière question et tout répondu, afficher résultats
      if (currentIndex === questions.length - 1) {
        const answeredCount = Object.values(userAnswers).filter(a => a.isCorrect !== undefined).length;
        if (answeredCount === questions.length) {
          setTimeout(showResults, 400);
        }
      }
    }

    function showCorrection(q, answerObj) {
      const { isCorrect } = answerObj;

      if (q.type === "mcq" || q.type === "truefalse") {
        const labels = optionsContainer.querySelectorAll(".option");
        labels.forEach((label) => {
          label.classList.remove("correct", "incorrect");
        });

        if (q.type === "mcq") {
          labels.forEach((label, idx) => {
            if (idx === q.correctIndex) {
              label.classList.add("correct");
            }
          });
          const chosenIndex = Number(answerObj.value);
          if (chosenIndex !== q.correctIndex) {
            labels[chosenIndex]?.classList.add("incorrect");
          }
        } else {
          const inputs = optionsContainer.querySelectorAll("input");
          inputs.forEach((inp, idx) => {
            const label = labels[idx];
            const val = inp.value === "true";
            if (val === q.correctBool) {
              label.classList.add("correct");
            }
            if (String(inp.value) === String(answerObj.value) && val !== q.correctBool) {
              label.classList.add("incorrect");
            }
          });
        }
      }

      if (isCorrect) {
        feedbackEl.textContent = "✅ Bonne réponse !";
        feedbackEl.className = "feedback correct";
      } else {
        feedbackEl.textContent = "❌ Réponse à revoir.";
        feedbackEl.className = "feedback incorrect";
      }

      explanationEl.textContent = q.explanation || "";
    }

    function showResults() {
      const total = questions.length;
      const answeredCount = Object.values(userAnswers).filter(a => a.isCorrect !== undefined).length;
      const percent = Math.round((score / total) * 100);

      resultsScoreEl.textContent = `${score} / ${total} (${percent} %)`;
      resultsDetailEl.textContent = `Tu as répondu correctement à ${score} question(s) sur ${total}.`;

      resultsBadgesEl.innerHTML = "";
      if (percent === 100) {
        resultsBadgesEl.innerHTML += `<div class="badge good">🌟 Maîtrise parfaite !</div>`;
      } else if (percent >= 75) {
        resultsBadgesEl.innerHTML += `<div class="badge good">👍 Très bon niveau</div>`;
      } else if (percent >= 50) {
        resultsBadgesEl.innerHTML += `<div class="badge warn">💡 Encore un peu de révision</div>`;
      } else {
        resultsBadgesEl.innerHTML += `<div class="badge warn">📚 Revois le chapitre et réessaie</div>`;
      }

      resultsBadgesEl.innerHTML += `<div class="badge">Chapitre : Immunité & Excrétion</div>`;
      resultsModal.style.display = "flex";
    }

    function restartQuiz() {
      currentIndex = 0;
      userAnswers = {};
      score = 0;
      resultsModal.style.display = "none";
      renderQuestion();
    }

    // --- ÉVÉNEMENTS ---
    btnCheck.addEventListener("click", checkAnswer);

    btnNext.addEventListener("click", () => {
      if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderQuestion();
      } else {
        // si on clique sur "Terminer" sans tout vérifier
        const answeredCount = Object.values(userAnswers).filter(a => a.isCorrect !== undefined).length;
        if (answeredCount < questions.length) {
          feedbackEl.textContent = "Tu n’as pas vérifié toutes les questions.";
          feedbackEl.className = "feedback incorrect";
        } else {
          showResults();
        }
      }
    });

    btnPrev.addEventListener("click", () => {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    });

    btnRestart.addEventListener("click", restartQuiz);

    // Fermer la modale en cliquant à l’extérieur
    resultsModal.addEventListener("click", (e) => {
      if (e.target === resultsModal) {
        resultsModal.style.display = "none";
      }
    });

    // Initialisation
    renderQuestion();
  </script>
</body>
</html>
